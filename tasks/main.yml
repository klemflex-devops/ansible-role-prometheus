---
# tasks file for prometheus
- name: Add user Prometheus
  user:
    name: prometheus
    create_home: false
    shell: /bin/false

- name: Create work directory
  file:
    path: /etc/prometheus
    owner: prometheus
    state: directory

- name: Create work directory
  file:
    path: /var/lib/prometheus
    owner: prometheus
    state: directory

- name: Prometheus installig 
  get_url:
    url: https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz
    dest: /tmp/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz
    mode: '0755'

- name: Unarchive a file
  unarchive:
    src: /tmp/prometheus-{{ prometheus_version }}.linux-amd64.tar.gz
    dest: /tmp/
    remote_src: yes    

- name: Copy binary prometheus
  copy:
    src: /tmp/prometheus-{{ prometheus_version }}.linux-amd64/prometheus
    dest: /usr/local/bin/prometheus
    mode: '0755'
    remote_src: yes
    owner: prometheus
    group: prometheus

- name: Copy binary promtool
  copy:
    src: /tmp/prometheus-{{ prometheus_version }}.linux-amd64/promtool
    dest: /usr/local/bin/promtool
    mode: '0755'
    remote_src: yes
    owner: prometheus
    group: prometheus
    
- name: Copy lib console
  copy:
    src: /tmp/prometheus-{{ prometheus_version }}.linux-amd64/consoles
    dest: /etc/prometheus/consoles
    mode: '0755'
    remote_src: yes
    owner: prometheus
    group: prometheus

- name: Copy lib console
  copy:
    src: /tmp/prometheus-{{ prometheus_version }}.linux-amd64/console_libraries
    dest: /etc/prometheus/console_libraries
    mode: '0755'
    remote_src: yes
    owner: prometheus
    group: prometheus
